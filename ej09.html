<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 9 - Galería de Imágenes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #212121;
            color: white;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            font-size: 2rem;
            color: #ffcc02;
            margin-bottom: 8px;
        }
        
        .subtitulo {
            text-align: center;
            color: #aaa;
            margin-bottom: 36px;
            font-size: 0.95rem;
        }
        /* ===== GALERÍA: cuadrícula de imágenes ===== */
        
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto 40px;
        }
        
        .galeria-item {
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            aspect-ratio: 1;
            background: #333333;
        }
        /* La imagen ocupa todo el cuadro */
        
        .galeria-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }
        /* Texto que aparece al pasar el ratón */
        
        .galeria-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .galeria-item:hover img {
            transform: scale(1.08);
        }
        
        .galeria-item:hover .overlay {
            opacity: 1;
        }
        /* ===== VENTANA EMERGENTE  ===== */
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        /* Cuando se activa, se muestra */
        
        .modal.activo {
            display: flex;
        }
        
        .modal img {
            max-width: 80vw;
            max-height: 70vh;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 204, 2, 0.3);
        }
        
        .modal .titulo-modal {
            color: #ffcc02;
            margin-top: 16px;
            font-size: 1.2rem;
        }
        
        .modal .cerrar {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        
        .modal .cerrar:hover {
            color: #ffcc02;
        }
        
        .volver {
            display: block;
            text-align: center;
            color: #ffcc02;
            text-decoration: none;
            border-bottom: 2px solid #ffcc02;
            width: fit-content;
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <!-- EJERCICIO 9: Galería de Imágenes con Ventana Emergente -->

    <h1>🖼 Galería de Pasatiempos</h1>
    <p class="subtitulo">Haz clic en cualquier imagen para verla en grande</p>

    <div class="galeria">

        <!-- Imagen 1 -->
        <div class="galeria-item" onclick="abrirModal('https://picsum.photos/seed/gaming/800/600', '🎮 Videojuegos')">
            <img src="https://picsum.photos/seed/gaming/400/400" alt="Videojuegos">
            <div class="overlay">🎮 Videojuegos — clic para agrandar</div>
        </div>

        <!-- Imagen 2 -->
        <div class="galeria-item" onclick="abrirModal('https://picsum.photos/seed/books/800/600', '📚 Libros')">
            <img src="https://picsum.photos/seed/books/400/400" alt="Libros">
            <div class="overlay">📚 Libros — clic para agrandar</div>
        </div>

        <!-- Imagen 3 -->
        <div class="galeria-item" onclick="abrirModal('https://picsum.photos/seed/music/800/600', '🎵 Música')">
            <img src="https://picsum.photos/seed/music/400/400" alt="Música">
            <div class="overlay">🎵 Música — clic para agrandar</div>
        </div>

        <!-- Imagen 4 (extra) -->
        <div class="galeria-item" onclick="abrirModal('https://picsum.photos/seed/cycling/800/600', '🚴 Ciclismo')">
            <img src="https://picsum.photos/seed/cycling/400/400" alt="Ciclismo">
            <div class="overlay">🚴 Ciclismo — clic para agrandar</div>
        </div>

        <!-- Imagen 5 (extra) -->
        <div class="galeria-item" onclick="abrirModal('https://picsum.photos/seed/nature/800/600', '🌿 Naturaleza')">
            <img src="https://picsum.photos/seed/nature/400/400" alt="Naturaleza">
            <div class="overlay">🌿 Naturaleza — clic para agrandar</div>
        </div>

        <!-- Imagen 6 (extra) -->
        <div class="galeria-item" onclick="abrirModal('https://picsum.photos/seed/travel/800/600', '✈ Viajes')">
            <img src="https://picsum.photos/seed/travel/400/400" alt="Viajes">
            <div class="overlay">✈ Viajes — clic para agrandar</div>
        </div>

    </div>

    <!-- La ventana emergente (modal) -->
    <div class="modal" id="modal" onclick="cerrarModal()">
        <span class="cerrar" onclick="cerrarModal()">✕</span>
        <img id="modal-img" src="" alt="Imagen ampliada">
        <p class="titulo-modal" id="modal-titulo"></p>
    </div>

    <a class="volver" href="index.html">← Volver al menú</a>

    <script>
        // Función que abre la ventana emergente
        function abrirModal(src, titulo) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal-titulo').textContent = titulo;
            document.getElementById('modal').classList.add('activo');
        }

        // Función que cierra la ventana emergente
        function cerrarModal() {
            document.getElementById('modal').classList.remove('activo');
        }

        // También cerrar si presionas la tecla Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') cerrarModal();
        });
    </script>

</body>

</html>
