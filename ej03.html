<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 - Tablas</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #e3f2fd;
      color: #0d47a1;
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
    }
    h1 { margin-bottom: 24px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th {
      background: #1565c0;
      color: white;
      padding: 12px 16px;
      text-align: left;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #bbdefb;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #e3f2fd; }
    a {
      display: inline-block;
      margin-top: 24px;
      color: #0d47a1;
      text-decoration: none;
      border-bottom: 2px solid #1565c0;
    }
  </style>
</head>
<body>

  <!-- EJERCICIO 3: Tablas -->

  <h1>Países y Capitales</h1>

  <table>
    <tr>
      <th>Nº</th>
      <th>País</th>
      <th>Capital</th>
    </tr>
    <tr>
      <td>1</td>
      <td>🇪🇨 Ecuador</td>
      <td>Quito</td>
    </tr>
    <tr>
      <td>2</td>
      <td>🇫🇷 Francia</td>
      <td>París</td>
    </tr>
    <tr>
      <td>3</td>
      <td>🇯🇵 Japón</td>
      <td>Tokio</td>
    </tr>
  </table>

  <a href="index.html">← Volver al menú</a>

</body>
</html>
