<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 4 - Formulario</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f3e5f5;
      color: #4a148c;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
    }
    h1 { margin-bottom: 24px; }
    .form-grupo {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #ce93d8;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #7b1fa2;
    }
    button {
      background: #7b1fa2;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    button:hover { background: #4a148c; }
    #mensaje {
      margin-top: 16px;
      font-weight: bold;
      color: #2e7d32;
      display: none;
    }
    a {
      display: inline-block;
      margin-top: 24px;
      color: #4a148c;
      text-decoration: none;
      border-bottom: 2px solid #7b1fa2;
    }
  </style>
</head>
<body>

  <!-- EJERCICIO 4: Formulario Básico -->

  <h1>Formulario de Datos</h1>

  <!-- action="#" simula el envío sin salir de la página -->
  <form action="#" method="get" onsubmit="mostrarMensaje(event)">

    <div class="form-grupo">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required>
    </div>

    <div class="form-grupo">
      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
    </div>

    <div class="form-grupo">
      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" min="1" max="120" placeholder="Ej: 20" required>
    </div>

    <button type="submit">Enviar ✉</button>

  </form>

  <p id="mensaje">✅ ¡Formulario enviado correctamente!</p>

  <br>
  <a href="index.html">← Volver al menú</a>

  <script>
    function mostrarMensaje(e) {
      e.preventDefault(); // Evita recargar la página
      document.getElementById('mensaje').style.display = 'block';
    }
  </script>

</body>
</html>
